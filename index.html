<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commerce Design On Going Project</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f2;
  --surface:#fff;
  --border:rgba(0,0,0,0.07);
  --border-md:rgba(0,0,0,0.13);
  --text:#1a1a1a;
  --muted:#888;
  --faint:#d0d0d0;
  --row-h:44px;
  --label-w:280px;
  --hdr-h:68px;
  --today:#ef4444;
}
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:300;background:#111;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;gap:12px}
.logo{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.2px;white-space:nowrap}
.logo em{font-style:normal;opacity:.4;font-weight:400;margin-left:4px;font-size:11px}
.view-tabs{display:flex;background:rgba(255,255,255,.1);border-radius:7px;padding:2px;gap:1px}
.vtab{font-size:11px;font-weight:500;padding:4px 12px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:rgba(255,255,255,.5);transition:all .12s;white-space:nowrap}
.vtab.active{background:rgba(255,255,255,.15);color:#fff}
.tb-right{display:flex;align-items:center;gap:6px}
.btn{font-size:11px;padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .12s}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-vac{border-color:rgba(255,255,255,.2)}
.sync-badge{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.4)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#4ade80}

/* ── SUMMARY BAR ── */
.summary-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:stretch;gap:8px}
.sum-card{flex:1;min-width:0;border-radius:10px;padding:10px 14px;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;inset:0;border-radius:8px;opacity:.06;pointer-events:none}
.sum-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.sum-card.active{border-width:2px}
.sum-all{background:#f7f7f7;}
.sum-all.active{border-color:#1a1a1a;background:#f0f0f0}
.sum-inprogress{background:#f0fdf4}
.sum-inprogress.active{border-color:#16a34a;background:#dcfce7}
.sum-hold{background:#fafafa}
.sum-hold.active{border-color:#94a3b8;background:#f1f5f9}
.sum-waiting{background:#fffbeb}
.sum-waiting.active{border-color:#d97706;background:#fef3c7}
.sum-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.sum-count{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px}
.sum-all .sum-count{color:#1a1a1a}
.sum-inprogress .sum-count{color:#16a34a}
.sum-hold .sum-count{color:#64748b}
.sum-waiting .sum-count{color:#d97706}
.sum-sub{font-size:10px;color:var(--muted);line-height:1.4}
.sum-sep{width:1px;background:var(--border);flex-shrink:0;margin:4px 0}

/* ── FILTER BAR ── */
.filterbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px;white-space:nowrap}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border-md);background:var(--surface);cursor:pointer;color:var(--muted);transition:all .12s;white-space:nowrap;line-height:1.4}
.chip.on{color:#fff;border-color:transparent}
.sep{width:1px;height:14px;background:var(--border-md);flex-shrink:0;margin:0 2px}

/* ── DRAG RESIZE HANDLE ── */
/* overlay line that sits between label col and timeline col */
.col-resizer{
  position:absolute;top:0;bottom:0;width:8px;
  cursor:col-resize;z-index:200;
  transform:translateX(-50%);
  display:flex;align-items:stretch;justify-content:center;
}
.col-resizer-line{
  width:3px;background:transparent;border-radius:3px;
  transition:background .12s;pointer-events:none;
}
.col-resizer:hover .col-resizer-line,
.col-resizer.dragging .col-resizer-line{background:#3b82f6;}
body.resizing{cursor:col-resize!important;user-select:none!important}

/* ── TIMELINE WRAPPER ── */
.tl-wrap{overflow:auto;height:calc(100vh - 160px)}
.tl-grid{display:grid}
.months-hdr,.grp-tl,.epic-tl,.tkt-tl,.callout-row-span{position:relative}

/* ── MONTH HEADER ── */
.hdr-spacer{position:sticky;left:0;top:0;z-index:80;background:var(--surface);border-right:3px solid var(--border-md);border-bottom:2px solid var(--border-md);height:var(--hdr-h);display:flex;align-items:flex-end;padding:0 14px 8px;gap:8px}
.hdr-title-col{font-size:10px;color:var(--muted);font-weight:500}
.months-hdr{position:sticky;top:0;z-index:70;height:var(--hdr-h);border-bottom:2px solid var(--border-md);background:var(--surface);position:relative;overflow:hidden}
.m-block{position:absolute;top:0;bottom:0;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:8px 8px 0;overflow:hidden}
.m-name{font-size:11px;font-weight:600;margin-bottom:4px}
.w-marks{display:flex;flex:1}
.w-mark{flex:1;font-size:9px;color:var(--faint);border-left:1px solid var(--border);padding:2px 0 0 3px;overflow:hidden}
.today-hdr{position:absolute;top:0;bottom:0;width:2px;background:var(--today);opacity:.8;z-index:5;pointer-events:none}

/* ── GROUP (MEMBER) ROW ── */
.grp-label{
  position:sticky;left:0;z-index:50;
  border-right:3px solid var(--border-md);
  border-bottom:1px solid rgba(0,0,0,.06);
  border-top:3px solid rgba(0,0,0,.08);
  display:flex;align-items:center;gap:8px;padding:0 14px;height:38px;cursor:pointer;
}
.grp-tl{border-bottom:1px solid rgba(0,0,0,.06);border-top:3px solid rgba(0,0,0,.08);height:38px;position:relative}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.grp-name{font-size:12px;font-weight:700;letter-spacing:-.2px}
.grp-count{font-size:10px;color:var(--muted);margin-left:auto;background:rgba(0,0,0,.06);padding:2px 7px;border-radius:10px}
.toggle-icon{font-size:9px;color:rgba(0,0,0,.3);transition:transform .15s;flex-shrink:0}
.toggle-icon.open{transform:rotate(90deg)}

/* Member color tints for group rows */
.grp-mjj{background:#e8f7ef}
.grp-kdw{background:#e8f0fc}
.grp-kjt{background:#fdf6e3}
.grp-kty{background:#fde8f3}
.grp-shj{background:#fdf0e8}
.grp-ljy{background:#eeebfd}
.grp-tl-mjj{background:#f0faf5}
.grp-tl-kdw{background:#f0f5fe}
.grp-tl-kjt{background:#fefaee}
.grp-tl-kty{background:#fef3fa}
.grp-tl-shj{background:#fef5f0}
.grp-tl-ljy{background:#f5f3fe}

/* ── EPIC ROW ── */
.epic-label{
  position:sticky;left:0;z-index:40;
  background:#f8f8f8;
  border-right:3px solid var(--border-md);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  min-height:var(--row-h);height:auto;
  padding:0;
}
.epic-left{display:flex;align-items:center;gap:5px;padding:5px 10px 5px 14px;flex:1;min-width:0;cursor:pointer}
.epic-left:hover .epic-title{text-decoration:underline}
.epic-status-select{
  font-size:9px;padding:2px 4px;border-radius:4px;
  border:1px solid var(--border-md);background:var(--surface);
  color:var(--text);cursor:pointer;flex-shrink:0;height:20px;
  margin-right:8px;margin-left:4px;
}
.epic-key{font-size:9px;color:var(--muted);font-family:monospace;flex-shrink:0}
.epic-title{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:var(--text)}
.callout-btn{font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--muted);flex-shrink:0;margin-right:6px;transition:all .12s}
.callout-btn:hover{background:#f0f0f0;color:var(--text)}
.callout-btn.has-note{background:#fef9c3;border-color:#fde68a;color:#92400e}
.epic-tl{background:#f8f8f8;border-bottom:1px solid var(--border);position:relative;min-height:var(--row-h)}

/* ── CALLOUT ROW ── */
.callout-row-label{position:sticky;left:0;z-index:40;background:#fffbeb;border-right:3px solid #fde68a;border-bottom:1px solid #fde68a;padding:7px 12px 7px 18px}
.callout-row-span{background:#fffbeb;border-bottom:1px solid #fde68a;padding:7px 14px}
.callout-label-txt{font-size:10px;color:#92400e;font-weight:600;margin-bottom:4px}
.callout-ta{width:100%;font-size:11px;border:1px solid #fde68a;border-radius:5px;padding:5px 8px;background:#fffef5;color:#1a1a1a;resize:vertical;min-height:44px;font-family:inherit;line-height:1.5}
.callout-ta:focus{outline:none;border-color:#f59e0b;background:#fff}

/* ── TICKET ROW ── */
.tkt-label{
  position:sticky;left:0;z-index:30;
  background:var(--surface);
  border-right:3px solid var(--border-md);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px 0 24px;height:var(--row-h);gap:5px;cursor:pointer;
}
.tkt-label:hover{background:#f7f7f7}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tkt-key{font-size:9px;color:var(--muted);font-family:monospace;flex-shrink:0;white-space:nowrap}
.tkt-title{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tkt-info{display:flex;flex-direction:column;flex:1;min-width:0;gap:1px}
.tkt-info-title{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tkt-info-key{font-size:9px;color:var(--muted);font-family:monospace;line-height:1.3}
.tkt-tl{background:var(--surface);border-bottom:1px solid var(--border);position:relative;height:var(--row-h)}
.tkt-tl:hover{background:#fafafa}

/* ── VACATION PANEL ── */
.vac-panel{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border-md);z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.vac-panel.open{transform:translateX(0)}
.vac-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.vac-hdr-title{font-size:13px;font-weight:600}
.vac-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1;padding:0 4px}
.vac-body{flex:1;overflow-y:auto;padding:12px 16px}
.vac-member{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.vac-member:last-child{border-bottom:none}
.vac-member-name{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.vac-entries{display:flex;flex-direction:column;gap:5px}
.vac-entry{display:flex;align-items:center;gap:5px;font-size:11px}
.vac-entry input{font-size:11px;padding:3px 7px;border:1px solid var(--border-md);border-radius:5px;background:var(--surface);color:var(--text);height:26px}
.vac-entry input[type=date]{width:112px}
.vac-entry input[type=text]{flex:1;min-width:0}
.vac-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 3px;line-height:1}
.vac-del:hover{color:#ef4444}
.vac-add{font-size:11px;padding:5px 10px;border-radius:6px;border:1px dashed var(--border-md);background:transparent;cursor:pointer;color:var(--muted);width:100%;margin-top:5px;transition:all .12s}
.vac-add:hover{background:#f5f5f5;color:var(--text)}

/* ── TIMELINE ELEMENTS ── */
.grid-lines{position:absolute;inset:0;display:flex;pointer-events:none;z-index:0}
.gc{flex:1;border-right:1px solid rgba(0,0,0,.035)}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);opacity:.5;z-index:4;pointer-events:none}
.vac-band{position:absolute;top:0;bottom:0;background:repeating-linear-gradient(-45deg,rgba(239,68,68,.04),rgba(239,68,68,.04) 4px,rgba(239,68,68,.09) 4px,rgba(239,68,68,.09) 8px);border-left:1px dashed rgba(239,68,68,.3);border-right:1px dashed rgba(239,68,68,.3);z-index:1;pointer-events:none}
.vac-band.half{top:25%;bottom:25%;background:repeating-linear-gradient(-45deg,rgba(239,68,68,.06),rgba(239,68,68,.06) 4px,rgba(239,68,68,.13) 4px,rgba(239,68,68,.13) 8px)}
.tl-bar{position:absolute;top:50%;transform:translateY(-50%);height:18px;border-radius:4px;display:flex;align-items:center;overflow:hidden;cursor:pointer;z-index:3;min-width:4px;transition:filter .1s,box-shadow .1s}
.tl-bar:hover{filter:brightness(.88);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tl-bar.no-date{left:6px;right:6px;background:repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(0,0,0,.05) 4px,rgba(0,0,0,.06) 5px);border:1px dashed rgba(0,0,0,.15);opacity:.5;height:14px}
.bar-lbl{font-size:10px;font-weight:500;padding:0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.pt-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:2px solid var(--surface);z-index:3;cursor:pointer}

/* ── MEMBER ROW IN VAC PANEL ── */
.mem-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.mem-avatar-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;flex-shrink:0;
  transition:transform .12s,box-shadow .12s;
  position:relative;
}
.mem-avatar-btn:hover{transform:scale(1.1);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.mem-avatar-btn::after{
  content:'✏️';position:absolute;bottom:-2px;right:-2px;
  font-size:9px;background:var(--surface);border-radius:50%;
  width:13px;height:13px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border-md);
}
.mem-name-label{font-size:12px;font-weight:600;flex:1}
.mem-color-btn{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border-md);
  cursor:pointer;padding:0;flex-shrink:0;
  transition:transform .12s;
}
.mem-color-btn:hover{transform:scale(1.15)}
/* emoji picker popup */
.emoji-picker-popup{
  position:fixed;z-index:9000;background:var(--surface);
  border:1px solid var(--border-md);border-radius:12px;
  padding:10px;box-shadow:0 8px 32px rgba(0,0,0,.16);
  display:none;
}
.emoji-picker-popup.show{display:block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,32px);gap:3px}
.emoji-opt{
  width:32px;height:32px;font-size:18px;display:flex;
  align-items:center;justify-content:center;
  border-radius:6px;cursor:pointer;border:none;background:transparent;
  transition:background .1s;
}
.emoji-opt:hover{background:#f0f0f0}
.emoji-opt.clear{font-size:11px;color:var(--muted)}

/* ── EMOJI PICKER CATEGORIES ── */
.emoji-cats{display:flex;gap:2px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.emoji-cat-btn{font-size:14px;width:30px;height:26px;border:none;background:transparent;cursor:pointer;border-radius:5px;opacity:.5;transition:opacity .1s,background .1s}
.emoji-cat-btn:hover,.emoji-cat-btn.active{opacity:1;background:#f0f0f0}
.emoji-grid{display:grid;grid-template-columns:repeat(8,32px);gap:2px;max-height:192px;overflow-y:auto}

/* ── ADD MEMBER MODAL ── */
.add-member-modal{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
.add-member-modal.hidden{display:none}
.add-member-box{background:var(--surface);border-radius:14px;padding:20px;width:360px;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.add-member-title{font-size:14px;font-weight:700;margin-bottom:4px}
.add-member-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.add-member-search{width:100%;font-size:12px;padding:8px 12px;border:1px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);margin-bottom:10px}
.add-member-search:focus{outline:none;border-color:#3b82f6}
.add-member-results{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.add-member-result{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.add-member-result:hover{background:#f5f5f5}
.add-member-result.selected{background:#eff6ff;border-color:#3b82f6}
.add-member-result-avatar{width:28px;height:28px;border-radius:50%;background:#e0e7ff;color:#3730a3;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.add-member-result-name{font-size:12px;font-weight:500;flex:1}
.add-member-result-email{font-size:10px;color:var(--muted)}
.add-member-empty,.add-member-searching{font-size:11px;color:var(--muted);text-align:center;padding:16px 0}
.add-member-footer{display:flex;gap:8px;justify-content:flex-end}
.add-member-cancel{font-size:12px;padding:7px 14px;border-radius:7px;border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--muted)}
.add-member-cancel:hover{background:#f5f5f5}
.add-member-confirm{font-size:12px;padding:7px 14px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.add-member-confirm:disabled{background:#d1d5db;cursor:default}
.add-member-confirm:not(:disabled):hover{background:#333}
.add-member-chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px dashed var(--border-md);background:transparent;cursor:pointer;color:var(--muted);transition:all .12s;white-space:nowrap}
.add-member-chip:hover{background:#f0f0f0;color:var(--text);border-color:rgba(0,0,0,.2)}
.vac-add-member{font-size:11px;padding:6px 12px;border-radius:7px;border:1px dashed var(--border-md);background:transparent;cursor:pointer;color:var(--muted);width:100%;margin-top:10px;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px}
.vac-add-member:hover{background:#f0f0f0;color:var(--text)}

.epic-toggle{
  font-size:9px;color:rgba(0,0,0,.3);transition:transform .15s;
  flex-shrink:0;padding:0 6px 0 2px;cursor:pointer;line-height:1;
  align-self:stretch;display:flex;align-items:center;
}
.epic-toggle.open{transform:rotate(90deg)}
.epic-child-count{
  font-size:9px;background:rgba(0,0,0,.07);color:var(--muted);
  padding:1px 5px;border-radius:8px;flex-shrink:0;margin-right:2px;
  white-space:nowrap;
}
.spill{display:inline-flex;align-items:center;font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px;letter-spacing:.2px;flex-shrink:0}
.sp-green{background:#dcfce7;color:#166534}
.sp-yellow{background:#fef9c3;color:#854d0e}
.sp-red{background:#fee2e2;color:#991b1b}
.sp-rfdev{background:#dbeafe;color:#1e40af}
.sp-hold{background:#f1f5f9;color:#64748b}
.sp-none{background:#f3f4f6;color:#9ca3af}

/* ── DUE DATE BUTTON ── */
.epic-due-btn{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid var(--border-md);background:var(--surface);color:var(--muted);cursor:pointer;flex-shrink:0;margin-right:4px;white-space:nowrap;transition:all .12s;font-family:monospace}
.epic-due-btn:hover{background:#f5f5f5;color:var(--text)}
.epic-due-btn.overdue{color:#dc2626;border-color:#fca5a5;background:#fef2f2}
.epic-due-btn.soon{color:#d97706;border-color:#fde68a;background:#fffbeb}
.epic-due-input{font-size:10px;height:22px;padding:0 5px;border:1px solid #3b82f6;border-radius:4px;background:var(--surface);color:var(--text);margin-right:4px;cursor:pointer;flex-shrink:0;outline:none;width:110px}
/* ── COMMENT MODAL ── */
.comment-modal{position:fixed;inset:0;z-index:3000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(2px)}
.comment-modal.hidden{display:none}
.comment-box{background:var(--surface);border-radius:14px;padding:20px;width:440px;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.comment-box-title{font-size:13px;font-weight:700;margin-bottom:3px}
.comment-box-sub{font-size:11px;color:var(--muted);margin-bottom:12px;font-family:monospace}
.comment-ta{width:100%;font-size:12px;border:1px solid var(--border-md);border-radius:8px;padding:10px 12px;background:var(--surface);color:var(--text);resize:vertical;min-height:100px;font-family:inherit;line-height:1.6}
.comment-ta:focus{outline:none;border-color:#3b82f6}
.comment-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;align-items:center}
.comment-status{font-size:11px;color:var(--muted);flex:1}
.comment-cancel{font-size:12px;padding:7px 14px;border-radius:7px;border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--muted)}
.comment-cancel:hover{background:#f5f5f5}
.comment-submit{font-size:12px;padding:7px 14px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.comment-submit:disabled{background:#d1d5db;cursor:default}
.comment-submit:not(:disabled):hover{background:#333}

/* ── LEGEND ── */
.legend{display:flex;gap:10px;align-items:center}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.5)}
.leg-bar{width:18px;height:6px;border-radius:3px}

/* ── TOOLTIP ── */
.tip{position:fixed;z-index:9999;background:#111;color:#fff;font-size:11px;padding:9px 13px;border-radius:9px;max-width:260px;pointer-events:none;display:none;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.tip-key{font-family:monospace;opacity:.5;font-size:10px}
.tip-title{font-weight:600;margin:2px 0 5px;font-size:12px}
.tip-meta{opacity:.65;font-size:10px}
</style>

// ── Color utils ──
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}
function luminance({r,g,b}){return(0.299*r+0.587*g+0.114*b)/255;}
function lighten(h,amt){// amt 0-1 toward white
  const {r,g,b}=hexToRgb(h);
  const ri=Math.round(r+(255-r)*amt),gi=Math.round(g+(255-g)*amt),bi=Math.round(b+(255-b)*amt);
  return '#'+[ri,gi,bi].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darken(h,amt){// amt 0-1 toward black
  const {r,g,b}=hexToRgb(h);
  const ri=Math.round(r*(1-amt)),gi=Math.round(g*(1-amt)),bi=Math.round(b*(1-amt));
  return '#'+[ri,gi,bi].map(v=>v.toString(16).padStart(2,'0')).join('');
}
// Given a single "accent" color, derive bg (very light), text (dark shade), bar (saturated)
function deriveColors(accent){
  const bg=lighten(accent,.82);
  const lum=luminance(hexToRgb(accent));
  const text=lum>0.55?darken(accent,.55):darken(accent,.35);
  const bar=lum>0.7?darken(accent,.2):accent;
  return{color:bg,text,bar};
}

function getMember(name){
  const base=MEMBERS.find(m=>m.name===name)||MEMBERS[0];
  const saved=memberProfiles[name]||{};
  if(saved.accent){
    const derived=deriveColors(saved.accent);
    return{...base,...derived,accent:saved.accent,emoji:saved.emoji||''};
  }
  return{...base,accent:base.bar,emoji:saved.emoji||''};
}

const WK_PX=44;      // 접힘: 1주 = 44px
const DAY_PX=16;     // 펼침: 1일 = 16px

function dOff(s){if(!s)return null;return(new Date(s)-VIEW_START)/864e5;}
const todayOff=dOff(TODAY_STR);

// 오늘 달만 기본 펼침
const todayMonth=TODAY.getMonth();
let expandedMonths=new Set([todayMonth]);

// MONTHS 계산
const MONTHS=[];
let mc2=new Date(VIEW_START.getFullYear(),VIEW_START.getMonth(),1);
while(mc2<=VIEW_END){
  const mn=new Date(mc2.getFullYear(),mc2.getMonth()+1,1);
  const sO=Math.max(0,dOff(mc2.toISOString().slice(0,10)));
  const eO=Math.min(TOTAL_DAYS,(new Date(Math.min(+mn,+VIEW_END))-VIEW_START)/864e5);
  MONTHS.push({month:mc2.getMonth(),year:mc2.getFullYear(),sO,eO,days:Math.round(eO-sO)});
  mc2=mn;
}

// monthPx(m): 이 달의 픽셀 너비 (접힘=주단위, 펼침=일단위)
function monthPx(m){
  if(expandedMonths.has(m.month)) return m.days*DAY_PX;
  return Math.ceil(m.days/7)*WK_PX;
}

// absPx(dayOffset): 전체 타임라인에서의 절대 픽셀 위치
function absPx(d){
  let px=0;
  for(const m of MONTHS){
    if(d<=m.sO){break;}
    const dInMonth=Math.min(d,m.eO)-m.sO;
    if(expandedMonths.has(m.month)){
      px+=dInMonth*DAY_PX;
    } else {
      px+=(dInMonth/7)*WK_PX;
    }
  }
  return px;
}
function px(d){return absPx(d).toFixed(1)+'px';}
function pct(){return'0%';} // legacy stub

function getTLWidth(){
  return MONTHS.reduce((s,m)=>s+monthPx(m),0);
}

function toggleMonth(monthIdx){
  if(expandedMonths.has(monthIdx)) expandedMonths.delete(monthIdx);
  else expandedMonths.add(monthIdx);
  render();
}

// ── Drag-resize column ──
function applyLabelWidth(w){
  labelWidth=Math.min(520,Math.max(140,w));
  document.documentElement.style.setProperty('--label-w',labelWidth+'px');
  document.getElementById('tlGrid').style.gridTemplateColumns=labelWidth+'px '+getTLWidth()+'px';
  // reposition the resizer handle to follow the column edge
  const wrap=document.getElementById('tlWrap');
  const resizer=document.getElementById('colResizer');
  // offset = labelWidth minus scroll offset of the wrapper
  resizer.style.left=(labelWidth - wrap.scrollLeft)+'px';
}
function initResizer(){
  const resizer=document.getElementById('colResizer');
  const wrap=document.getElementById('tlWrap');
  let startX=0,startW=0;
  resizer.addEventListener('mousedown',e=>{
    e.preventDefault();
    startX=e.clientX; startW=labelWidth;
    resizer.classList.add('dragging');
    document.body.classList.add('resizing');
    const onMove=e2=>{
      applyLabelWidth(startW+(e2.clientX-startX));
    };
    const onUp=()=>{
      resizer.classList.remove('dragging');
      document.body.classList.remove('resizing');
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  // keep resizer aligned when the timeline scrolls horizontally
  wrap.addEventListener('scroll',()=>{
    resizer.style.left=(labelWidth - wrap.scrollLeft)+'px';
  });

    if(isExpanded){

        const date=new Date(VIEW_START.getTime()+(m.sO+d)*864e5);
        const isWeekend=date.getDay()===0||date.getDay()===6;
        const isTodayDay=Math.floor(m.sO+d)===Math.floor(todayOff);

function makeBar(issue,vacBands,parent){
  const sc2=SC[issue.statusName]||SC_DEF;
  const sO=dOff(issue.startdate),eO=issue.duedate?dOff(issue.duedate)+1:null;
  if(!issue.startdate&&!issue.duedate){
    const bar=document.createElement('div');bar.className='tl-bar no-date';
    bar.style.left='4px';bar.style.right='4px';bar.style.width='';
    bar.innerHTML=`<span class="bar-lbl" style="color:#999">${issue.title}</span>`;
    bar.onclick=()=>window.open(JIRA+issue.key,'_blank');
    bar.addEventListener('mouseenter',e=>showTip(e,issue));bar.addEventListener('mouseleave',hideTip);
    parent.appendChild(bar);return;
  }
  // bar width: absPx(eO) - absPx(sO) — 스케일 분기를 정확히 반영
  function barW(s,e){
    return Math.max(4, absPx(e)-absPx(Math.max(0,s))).toFixed(1)+'px';
  }
  if(sO!==null&&eO!==null){
    const bar=document.createElement('div');bar.className='tl-bar';
    bar.style.left=px(Math.max(0,sO));
    bar.style.width=barW(sO,eO);
    bar.style.background=sc2.bar;if((SC[issue.statusName]||{}).op)bar.style.opacity=SC[issue.statusName].op;
    bar.innerHTML=`<span class="bar-lbl" style="color:${sc2.text}">${issue.title}</span>`;
    bar.onclick=()=>window.open(JIRA+issue.key,'_blank');
    bar.addEventListener('mouseenter',e=>showTip(e,issue));bar.addEventListener('mouseleave',hideTip);
    parent.appendChild(bar);
  }else if(sO!==null){
    const bar=document.createElement('div');bar.className='tl-bar';
    bar.style.left=px(Math.max(0,sO));bar.style.right='0';
    bar.style.background=`linear-gradient(to right,${sc2.bar},transparent 80%)`;
    if((SC[issue.statusName]||{}).op)bar.style.opacity=SC[issue.statusName].op;
    bar.innerHTML=`<span class="bar-lbl" style="color:${sc2.text}">${issue.title}</span>`;
    bar.onclick=()=>window.open(JIRA+issue.key,'_blank');
    bar.addEventListener('mouseenter',e=>showTip(e,issue));bar.addEventListener('mouseleave',hideTip);
    parent.appendChild(bar);
  }else if(eO!==null){
    const dot=document.createElement('div');dot.className='pt-dot';dot.style.left=px(eO);dot.style.background=sc2.bar;
    dot.onclick=()=>window.open(JIRA+issue.key,'_blank');
    dot.addEventListener('mouseenter',e=>showTip(e,issue));dot.addEventListener('mouseleave',hideTip);
    parent.appendChild(dot);
  }
}

// ── Due date button ──
function makeDueBtn(issueKey, duedateStr){
  const wrap=document.createElement('span');wrap.style.cssText='display:flex;align-items:center;flex-shrink:0';

  const btn=document.createElement('button');btn.className='epic-due-btn';
  btn.id=`due-btn-${issueKey}`;

  function formatDue(ds){
    if(!ds)return '날짜';
    const d=new Date(ds);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }
  function setClass(ds){
    btn.classList.remove('overdue','soon');
    if(!ds)return;
    const diff=(new Date(ds)-TODAY)/864e5;
    if(diff<0)btn.classList.add('overdue');
    else if(diff<=7)btn.classList.add('soon');
  }

  btn.textContent=formatDue(duedateStr);
  setClass(duedateStr);
  btn.onclick=e=>{
    e.stopPropagation();
    btn.style.display='none';
    const inp=document.createElement('input');inp.type='date';inp.className='epic-due-input';
    inp.value=duedateStr||'';
    inp.id=`due-inp-${issueKey}`;
    wrap.appendChild(inp);
    inp.focus();
    const commit=async()=>{
      const newDate=inp.value;
      inp.remove();btn.style.display='';
      if(!newDate)return;
      btn.textContent=formatDue(newDate);
      setClass(newDate);
      // update RAW
      const item=RAW.find(i=>i.key===issueKey);
      if(item)item.duedate=newDate;
      // Jira API update
      await jiraUpdateDuedate(issueKey, newDate);
    };
    inp.onblur=commit;
    inp.onkeydown=e2=>{if(e2.key==='Enter')inp.blur();if(e2.key==='Escape'){inp.remove();btn.style.display='';}};
  };
  wrap.appendChild(btn);
  return wrap;
}

// ── Jira API helpers ──
const JIRA_API=`https://api.anthropic.com/v1/messages`;
const JIRA_CLOUD_ID='23c14e7d-74ed-40b6-a0bb-fbc1f6351b84';

async function jiraUpdateDuedate(issueKey, dateStr){
  try{
    const resp=await fetch(JIRA_API,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:200,
        system:'You are a Jira API proxy. Update the duedate of a Jira issue. Reply with only "OK" if successful.',
        messages:[{role:'user',content:`Update duedate of issue ${issueKey} to ${dateStr} on cloud ${JIRA_CLOUD_ID}. Use the Jira editIssue tool.`}],
        mcp_servers:[{type:'url',url:'https://mcp.atlassian.com/v1/mcp',name:'atlassian'}]
      })
    });
    const data=await resp.json();
    console.log('duedate update:', issueKey, dateStr, data?.content?.[0]?.text);
  }catch(err){console.warn('duedate update failed',err);}
}

async function jiraAddComment(issueKey, commentText){
  const statusEl=document.getElementById('commentModalStatus');
  statusEl.textContent='등록 중...';
  document.getElementById('commentSubmitBtn').disabled=true;
  try{
    const resp=await fetch(JIRA_API,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:300,
        system:'You are a Jira API proxy. Add a comment to a Jira issue. Reply with only "OK" if successful.',
        messages:[{role:'user',content:`Add a comment to Jira issue ${issueKey} on cloud ${JIRA_CLOUD_ID}. Comment text: "${commentText}"`}],
        mcp_servers:[{type:'url',url:'https://mcp.atlassian.com/v1/mcp',name:'atlassian'}]
      })
    });
    const data=await resp.json();
    const txt=data?.content?.find(c=>c.type==='text')?.text||'';

}

function getVacBands(name){
  return(vacations[name]||[]).filter(v=>v.start).map(v=>{
    // half-day: single day, type='half'
    // vacation: start ~ end range
    const end = (v.type==='half'||!v.end) ? v.start : v.end;
    return[v.start, end, v.type||'vac'];
  });
}

// ── Main render ──
function render(){
  const g=document.getElementById('tlGrid');g.innerHTML='';
  g.style.gridTemplateColumns=labelWidth+'px '+getTLWidth()+'px';
  makeHdr(g);
  const allowedSt=SUM_GROUPS[summaryFilter];
  const filtered=RAW.filter(i=>activeMem.has(i.assignee)&&allowedSt.includes(i.statusName)&&(activePrj.has(i.project)||!['M29CMPROD','PD'].includes(i.project)));
  if(currentView==='member')renderByMember(g,filtered);
  else if(currentView==='epic')renderByEpic(g,filtered);
  else renderByProject(g,filtered);
}

function renderByMember(g,filtered){
  MEMBERS.forEach(m=>{
    if(!activeMem.has(m.name))return;
    const mp=getMember(m.name);
    const mIssues=filtered.filter(i=>i.assignee===m.name);
    if(mIssues.length===0)return;
    const vb=getVacBands(m.name);

    epics.forEach(epic=>{

}

function toggleVacPanel(){document.getElementById('vacPanel').classList.toggle('open');renderVacPanel();}

function renderVacPanel(){
  const body=document.getElementById('vacBody');body.innerHTML='';

  // close any open emoji picker on outside click
  document.addEventListener('click',closeEmojiPicker,{once:false});

  MEMBERS.forEach(m=>{
    const mp=getMember(m.name);
    const sec=document.createElement('div');sec.className='vac-member';

    // ── Member header row: avatar btn + name + color input ──
    const memRow=document.createElement('div');memRow.className='mem-row';

    // Avatar button (click → emoji picker)
    const avatarBtn=document.createElement('button');avatarBtn.className='mem-avatar-btn';
    avatarBtn.style.cssText=`background:${mp.emoji?lighten(mp.bar,.7):mp.color};color:${mp.text};font-size:${mp.emoji?'16px':'11px'}`;
    avatarBtn.textContent=mp.emoji||(m.name[0]+m.name[1]);
    avatarBtn.title='이모지 선택';
    avatarBtn.onclick=e=>{e.stopPropagation();openEmojiPicker(m.name,avatarBtn,mp.emoji);};

    // Name
    const nameSpan=document.createElement('span');nameSpan.className='mem-name-label';nameSpan.textContent=m.name;

    // Color swatch (click → native color picker)
    const colorBtn=document.createElement('input');colorBtn.type='color';colorBtn.className='mem-color-btn';
    colorBtn.value=mp.accent||mp.bar;colorBtn.title='테마 컬러 선택';
    colorBtn.oninput=()=>{
      if(!memberProfiles[m.name])memberProfiles[m.name]={};
      memberProfiles[m.name].accent=colorBtn.value;
      lsSave('cc_member_profiles',memberProfiles);
      // update avatar btn live
      const mp2=getMember(m.name);
      avatarBtn.style.background=mp2.emoji?lighten(mp2.bar,.7):mp2.color;
      buildFilters();render();
    };

    memRow.appendChild(avatarBtn);memRow.appendChild(nameSpan);memRow.appendChild(colorBtn);
    sec.appendChild(memRow);

    // ── Vacation entries ──
    const entries=document.createElement('div');entries.className='vac-entries';
    const vacs=vacations[m.name]||[];
    vacs.forEach((v,idx)=>{
      const row=document.createElement('div');row.className='vac-entry';
      // type select
      const typeSelect=document.createElement('select');
      typeSelect.style.cssText='font-size:10px;height:26px;border:1px solid var(--border-md);border-radius:5px;background:var(--surface);color:var(--text);padding:0 4px;flex-shrink:0;cursor:pointer';
      typeSelect.innerHTML='<option value="vac">휴가</option><option value="half">반차</option>';
      typeSelect.value=v.type||'vac';
      typeSelect.onchange=()=>{vacs[idx].type=typeSelect.value;lsSave('cc_vacations',vacations);render();};
      const s=document.createElement('input');s.type='date';s.value=v.start||'';
      const e2=document.createElement('input');e2.type='date';e2.value=v.end||'';
      // hide end date for half-day
      const refreshEndVisibility=()=>{e2.style.display=typeSelect.value==='half'?'none':'';};
      refreshEndVisibility();
      typeSelect.addEventListener('change',refreshEndVisibility);
      const lbl=document.createElement('input');lbl.type='text';lbl.placeholder='메모';lbl.value=v.label||'';
      const del=document.createElement('button');del.className='vac-del';del.textContent='×';
      s.onchange=()=>{vacs[idx].start=s.value;lsSave('cc_vacations',vacations);render();};
      e2.onchange=()=>{vacs[idx].end=e2.value;lsSave('cc_vacations',vacations);render();};
      lbl.oninput=()=>{vacs[idx].label=lbl.value;lsSave('cc_vacations',vacations);};
      del.onclick=()=>{vacs.splice(idx,1);vacations[m.name]=vacs;lsSave('cc_vacations',vacations);renderVacPanel();render();};
      row.appendChild(typeSelect);row.appendChild(s);row.appendChild(e2);row.appendChild(lbl);row.appendChild(del);entries.appendChild(row);
    });
    const addBtn=document.createElement('button');addBtn.className='vac-add';addBtn.textContent='+ 휴가/반차 추가';
    addBtn.onclick=()=>{if(!vacations[m.name])vacations[m.name]=[];vacations[m.name].push({start:'',end:'',label:'',type:'vac'});lsSave('cc_vacations',vacations);renderVacPanel();};
    sec.appendChild(entries);sec.appendChild(addBtn);
    body.appendChild(sec);
  });
  // + 멤버 추가 버튼 (패널 하단)
  const addMemberBtn=document.createElement('button');addMemberBtn.className='vac-add-member';
  addMemberBtn.innerHTML='<span>+</span> 멤버 추가';
  addMemberBtn.onclick=openAddMemberModal;
  body.appendChild(addMemberBtn);
}

function renderEmojiPickerContent(picker,memberName,currentEmoji,activeCat){
  picker.innerHTML='';

  const cats=document.createElement('div');cats.className='emoji-cats';
  EMOJI_CATS.forEach(cat=>{
    const btn=document.createElement('button');btn.className='emoji-cat-btn'+(cat.id===activeCat?' active':'');
    btn.textContent=cat.icon;btn.title=cat.label;
    btn.onclick=e=>{e.stopPropagation();_emojiActiveCat=cat.id;renderEmojiPickerContent(picker,memberName,currentEmoji,cat.id);};
    cats.appendChild(btn);
  });
  picker.appendChild(cats);
  // grid
  const grid=document.createElement('div');grid.className='emoji-grid';
  // clear btn
  const clr=document.createElement('button');clr.className='emoji-opt clear';clr.textContent='✕';clr.title='이모지 제거';
  clr.onclick=e=>{e.stopPropagation();applyEmoji(memberName,'');closeEmojiPicker();};
  grid.appendChild(clr);
  const list=(EMOJI_CATS.find(c=>c.id===activeCat)||EMOJI_CATS[0]).list;
  list.forEach(em=>{
    const btn=document.createElement('button');btn.className='emoji-opt';btn.textContent=em;
    if(em===currentEmoji)btn.style.background='#e8f0fe';
    btn.onclick=e=>{e.stopPropagation();applyEmoji(memberName,em);closeEmojiPicker();};
    grid.appendChild(btn);
  });
  picker.appendChild(grid);
}
function closeEmojiPicker(){const p=document.getElementById('emojiPickerPopup');if(p)p.style.display='none';}
function applyEmoji(memberName,em){

  lsSave('cc_member_profiles',memberProfiles);
  renderVacPanel();buildFilters();render();
}

let _selectedJiraUser=null;

function openAddMemberModal(){
  _selectedJiraUser=null;

  document.getElementById('addMemberResults').innerHTML='<div class="add-member-empty">검색어를 입력하세요</div>';

function closeAddMemberModal(){

}
document.getElementById('addMemberModal').addEventListener('click',e=>{if(e.target===document.getElementById('addMemberModal'))closeAddMemberModal();});

async function searchJiraUsers(q){
  clearTimeout(_searchTimer);
  const res=document.getElementById('addMemberResults');
  if(!q.trim()){res.innerHTML='<div class="add-member-empty">검색어를 입력하세요</div>';return;}
  res.innerHTML='<div class="add-member-searching">🔍 검색 중...</div>';
  _searchTimer=setTimeout(async()=>{
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:`You are a Jira user search proxy. Call the Jira REST API to search users. Return ONLY a JSON array (no markdown) of up to 8 matches with fields: accountId, displayName, emailAddress. Use Jira cloud: https://api.atlassian.com/ex/jira/${CLOUD_ID}/rest/api/3/user/search?query=${encodeURIComponent(q)}&maxResults=8`,
          messages:[{role:'user',content:`Search Jira users for: ${q}. Cloud ID: ${CLOUD_ID}. Return JSON array with accountId, displayName, emailAddress fields only.`}],
          mcp_servers:[{type:'url',url:'https://mcp.atlassian.com/v1/mcp',name:'atlassian'}]
        })
      });
      const data=await resp.json();
      const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      // try parse JSON from response
      const match=text.match(/\[[\s\S]*\]/);
      const users=match?JSON.parse(match[0]):[];
      renderUserResults(users,q);
    }catch(err){
      // fallback: show message
      res.innerHTML='<div class="add-member-empty">검색 결과를 불러오지 못했습니다.<br><small>Atlassian MCP 연결을 확인하세요</small></div>';
    }
  },350);
}

function renderUserResults(users,q){
  const res=document.getElementById('addMemberResults');
  // filter out already-added members
  const existing=new Set(MEMBERS.map(m=>m.name));
  const filtered=users.filter(u=>u.displayName&&!existing.has(u.displayName.split('/')[0].trim()));
  if(filtered.length===0){res.innerHTML='<div class="add-member-empty">검색 결과가 없거나 이미 추가된 멤버입니다</div>';return;}
  res.innerHTML='';
  filtered.forEach(u=>{
    const name=u.displayName.split('/')[0].trim();
    const row=document.createElement('div');row.className='add-member-result';
    if(_selectedJiraUser&&_selectedJiraUser.accountId===u.accountId)row.classList.add('selected');
    const av=document.createElement('div');av.className='add-member-result-avatar';av.textContent=name[0]+(name[1]||'');
    const info=document.createElement('div');info.style.cssText='display:flex;flex-direction:column;flex:1;min-width:0';
    const nm=document.createElement('div');nm.className='add-member-result-name';nm.textContent=name;
    const em=document.createElement('div');em.className='add-member-result-email';em.textContent=u.emailAddress||u.displayName;
    info.appendChild(nm);info.appendChild(em);
    row.appendChild(av);row.appendChild(info);
    row.onclick=()=>{
      _selectedJiraUser={...u,shortName:name};
      document.querySelectorAll('.add-member-result').forEach(r=>r.classList.remove('selected'));
      row.classList.add('selected');
      document.getElementById('addMemberConfirmBtn').disabled=false;
    };
    res.appendChild(row);
  });
}

function confirmAddMember(){
  if(!_selectedJiraUser)return;
  const name=_selectedJiraUser.shortName;
  if(MEMBERS.find(m=>m.name===name)){closeAddMemberModal();return;}
  // generate a color based on name hash
  const hues=[160,210,260,320,30,80,190,340];
  const h=hues[MEMBERS.length%hues.length];
  const accent=`hsl(${h},60%,55%)`;
  const derived=deriveColors(hslToHex(h,60,55));
  const newMember={
    name,cls:'custom_'+name.replace(/\s/g,'_'),
    color:derived.color,text:derived.text,bar:derived.bar,
    accountId:_selectedJiraUser.accountId
  };
  MEMBERS.push(newMember);
  activeMem.add(name);
  // persist
  const custom=ls('cc_custom_members',[]);
  custom.push(newMember);
  lsSave('cc_custom_members',custom);
  closeAddMemberModal();
  buildFilters();updateSummary();render();
  if(document.getElementById('vacPanel').classList.contains('open'))renderVacPanel();
}

function hslToHex(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return `#${f(0)}${f(8)}${f(4)}`;
}

function showTip(e,issue){
  const t=document.getElementById('tip');const sc2=SC[issue.statusName]||SC_DEF;
  t.innerHTML=`<div class="tip-key">${issue.key} · ${issue.projectName}</div><div class="tip-title">${issue.title}</div><div class="tip-meta">상태: <span style="color:${sc2.bar}">${issue.statusName}</span><br>담당: ${issue.assignee}${issue.startdate?'<br>시작: '+issue.startdate:''}${issue.duedate?'<br>마감: '+issue.duedate:''}</div>`;
  t.style.display='block';moveTip(e);
}
function moveTip(e){const t=document.getElementById('tip');t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-8)+'px';}
function hideTip(){document.getElementById('tip').style.display='none';}
document.addEventListener('mousemove',e=>{if(document.getElementById('tip').style.display!=='none')moveTip(e);});
