name: Sync Jira Tickets
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Jira and update HTML
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, re, base64, os

          email = os.environ['JIRA_EMAIL']
          token = os.environ['JIRA_TOKEN']
          auth = base64.b64encode(f"{email}:{token}".encode()).decode()
          CLOUD_ID = '23c14e7d-74ed-40b6-a0bb-fbc1f6351b84'

          MAP = {
            '712020:19e84b87-2a63-4584-a099-87eed24f86e4': '장미진',
            '712020:ac6ee917-de1d-4ec8-8c83-215625056596': '김다운',
            '712020:1c2f6acc-e88a-4507-8d4a-cd968ca25985': '김정탁',
            '712020:26c8baf3-b489-4ea8-a248-191a4242b0c0': '김태연',
            '712020:58531949-bfc1-4372-9e7b-5861dd285a16': '손효정',
            '5fa4b0f358f262007285553b': '이진용',
          }

          ids = '","'.join(MAP.keys())
          jql = f'assignee in ("{ids}") AND statusCategory != Done ORDER BY updated DESC'
          fields = 'summary,status,assignee,project,duedate,customfield_10014,customfield_10015,issuetype'

          all_issues = []
          start = 0
          while True:
            params = urllib.parse.urlencode({'jql': jql, 'fields': fields, 'maxResults': 100, 'startAt': start})
            url = f'https://api.atlassian.com/ex/jira/{CLOUD_ID}/rest/api/3/search?{params}'
            req = urllib.request.Request(url, headers={'Authorization': f'Basic {auth}', 'Accept': 'application/json'})
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            print(f'Issues: {len(data["issues"])}, Total: {data.get("total", "?")}')
            all_issues.extend(data['issues'])
            if len(data['issues']) < 100:
              break
            start += 100

          parsed = []
          for i in all_issues:
            f = i['fields']
            aid = (f.get('assignee') or {}).get('accountId', '')
            proj = (f.get('project') or {}).get('key', '')
            dn = ((f.get('assignee') or {}).get('displayName') or '').split('/')[0].strip()
            parsed.append({
              'key': i['key'],
              'title': (f.get('summary') or '').strip(),
              'statusName': (f.get('status') or {}).get('name', ''),
              'assignee': MAP.get(aid, dn),
              'project': proj,
              'projectName': '29CM' if proj == 'M29CMPROD' else '무신사' if proj == 'PD' else (f.get('project') or {}).get('name', proj),
              'duedate': f.get('duedate'),
              'startdate': f.get('customfield_10015'),
              'epic': f.get('customfield_10014'),
              'issuetype': (f.get('issuetype') or {}).get('name', ''),
            })

          with open('index.html', 'r') as f:
            html = f.read()
          raw_json = json.dumps(parsed, ensure_ascii=False)
          html = re.sub(r'const RAW=\[[\s\S]*?\];', f'const RAW={raw_json};', html)
          with open('index.html', 'w') as f:
            f.write(html)
          print(f'Updated {len(parsed)} tickets')
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto sync Jira $(date '+%Y-%m-%d %H:%M')"
          git push
